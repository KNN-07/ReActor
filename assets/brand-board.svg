<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">ReActor identity system</title>
  <desc id="desc">A dark developer-tool brand board for ReActor with a reaction-loop logo, ion lime and reactor teal palette, typography, and product applications.</desc>
  <defs>
    <linearGradient id="ion" x1="120" y1="120" x2="1420" y2="870" gradientUnits="userSpaceOnUse"><stop stop-color="#D8FF4F"/><stop offset="1" stop-color="#54D7C7"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1C2829" stroke-width="1"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="#070B0D"/><rect x="32" y="32" width="1536" height="936" rx="20" fill="url(#grid)" stroke="#233132"/>
  <text x="80" y="92" fill="#D8FF4F" font-family="ui-monospace,monospace" font-size="18" letter-spacing="5">REACTOR / IDENTITY SYSTEM / 01</text>
  <text x="80" y="190" fill="#F3F5EE" font-family="Inter, sans-serif" font-size="96" font-weight="650" letter-spacing="-5">reactor</text>
  <text x="86" y="232" fill="#9CAAA5" font-family="ui-monospace,monospace" font-size="18" letter-spacing="3">CONTROLLED INTELLIGENCE FOR BUILDERS</text>
  <g transform="translate(80 310) scale(3.6)"><rect width="64" height="64" rx="16" fill="#0A0F12" stroke="#334241"/><path d="M18 48V16h17.5c7.1 0 11.5 3.8 11.5 9.6 0 4.6-2.7 7.8-7.1 9.1L50 48h-9.1l-8.7-12.1H25V48h-7Zm7-25.6v7.2h9.7c3.1 0 4.8-1.2 4.8-3.6 0-2.4-1.7-3.6-4.8-3.6H25Z" fill="url(#ion)"/><path d="M38.5 9.5c10.2 1.3 17 8.6 17 18.1 0 6.7-3.2 12.5-8.7 16.1" fill="none" stroke="#54D7C7" stroke-width="3" stroke-linecap="round"/><path d="m45.1 41.8 1.7 5.2 5.4-1.2" fill="none" stroke="#54D7C7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="39.5" cy="9.8" r="2.5" fill="#D8FF4F"/></g>
  <text x="86" y="590" fill="#F3F5EE" font-family="Inter, sans-serif" font-size="34" font-weight="600">Make the next move.</text>
  <text x="86" y="630" fill="#9CAAA5" font-family="ui-monospace,monospace" font-size="16">R = action + reaction + restraint</text>
  <g transform="translate(760 120)"><rect width="720" height="360" rx="16" fill="#0B1214" stroke="#2A3A39"/><text x="44" y="54" fill="#9CAAA5" font-family="ui-monospace,monospace" font-size="14" letter-spacing="3">APPLICATION / TERMINAL</text><rect x="44" y="88" width="632" height="212" rx="10" fill="#070B0D" stroke="#20302F"/><circle cx="72" cy="116" r="6" fill="#D8FF4F"/><text x="96" y="122" fill="#83928B" font-family="ui-monospace,monospace" font-size="15">reactor run</text><text x="96" y="178" fill="#F3F5EE" font-family="ui-monospace,monospace" font-size="21">&quot;ship the change, prove it works&quot;</text><text x="96" y="230" fill="#54D7C7" font-family="ui-monospace,monospace" font-size="16">→ plan  → build  → review</text><text x="96" y="270" fill="#D8FF4F" font-family="ui-monospace,monospace" font-size="16">✓ verification evidence captured</text></g>
  <g transform="translate(760 550)"><text x="0" y="0" fill="#9CAAA5" font-family="ui-monospace,monospace" font-size="14" letter-spacing="3">PALETTE / ION FIELD</text><rect y="34" width="150" height="94" rx="10" fill="#070B0D"/><rect x="166" y="34" width="150" height="94" rx="10" fill="#D8FF4F"/><rect x="332" y="34" width="150" height="94" rx="10" fill="#54D7C7"/><rect x="498" y="34" width="150" height="94" rx="10" fill="#F3F5EE"/><text x="0" y="156" fill="#9CAAA5" font-family="ui-monospace,monospace" font-size="13">REACTOR BLACK</text><text x="166" y="156" fill="#9CAAA5" font-family="ui-monospace,monospace" font-size="13">ION LIME</text><text x="332" y="156" fill="#9CAAA5" font-family="ui-monospace,monospace" font-size="13">REACTOR TEAL</text><text x="498" y="156" fill="#9CAAA5" font-family="ui-monospace,monospace" font-size="13">WARM SIGNAL</text></g>
  <g transform="translate(760 800)"><text x="0" y="0" fill="#9CAAA5" font-family="ui-monospace,monospace" font-size="14" letter-spacing="3">TYPE / TECHNICAL + HUMAN</text><text x="0" y="56" fill="#F3F5EE" font-family="Inter, sans-serif" font-size="38" font-weight="650">Aa Bb Cc 0123</text><text x="0" y="92" fill="#54D7C7" font-family="ui-monospace,monospace" font-size="18">$ reactor --help</text></g>
  <text x="80" y="908" fill="#51605C" font-family="ui-monospace,monospace" font-size="14" letter-spacing="2">BOUNDED AUTONOMY / EXPLICIT CONTROL / EVIDENCE FIRST</text>
</svg>
