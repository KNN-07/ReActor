services:
  # ───────────────────────────────────────────────────────────────────────────
  # reactor-worker orchestrator
  #
  # NOTE: `env_file:` is INTENTIONALLY ABSENT. We never want the gh-proxy's
  # PAT (`GITHUB_TOKEN` in .env) to leak into this container's environment.
  # Every variable below is an explicit allowlist; compose still reads `.env`
  # for `${VAR}` interpolation, but only the keys listed here flow into the
  # container. Adding a new secret means an explicit compose-level decision
  # about which container is allowed to see it.
  # ───────────────────────────────────────────────────────────────────────────
  reactor_worker:
    build:
      # repository root: gives the web-builder stage access to the workspace
      # bun.lock + catalog (web/package.json refs `catalog:` versions).
      # python/reactor-worker/data and repository-root excludes are filtered via
      # Dockerfile.reactor-worker.dockerignore at the context root.
      context: ../..
      dockerfile: Dockerfile.reactor-worker
      args:
        # Tag of the pre-built reactor-base image produced by `bun run reactor:image`
        # (sources: repository root /Dockerfile). Override per-environment as needed.
        REACTOR_BASE: reactor/reactor:dev
    image: reactor-worker:dev
    container_name: reactor_worker
    # Phase B (graceful shutdown): gives the orchestrator at least
    # REACTOR_WORKER_SHUTDOWN_DRAIN_TIMEOUT_SECONDS + REACTOR_WORKER_SHUTDOWN_KILL_TIMEOUT_SECONDS
    # before SIGKILL. Defaults: 25 + 5 = 30s.
    stop_grace_period: 30s
    restart: unless-stopped
    environment:
      # --- gh-proxy channel ---
      # The orchestrator NEVER holds GITHUB_TOKEN; it talks to the sibling
      # gh-proxy container over the internal-only network.
      REACTOR_WORKER_GH_PROXY_URL: http://gh-proxy:8081
      REACTOR_WORKER_GH_PROXY_HMAC_KEY: ${REACTOR_WORKER_GH_PROXY_HMAC_KEY:?REACTOR_WORKER_GH_PROXY_HMAC_KEY must be set in .env}

      # --- webhook + identity ---
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      REACTOR_WORKER_BOT_LOGIN: ${REACTOR_WORKER_BOT_LOGIN:?REACTOR_WORKER_BOT_LOGIN must be set in .env}
      REACTOR_WORKER_GIT_AUTHOR_NAME: ${REACTOR_WORKER_GIT_AUTHOR_NAME:-}
      REACTOR_WORKER_GIT_AUTHOR_EMAIL: ${REACTOR_WORKER_GIT_AUTHOR_EMAIL:?REACTOR_WORKER_GIT_AUTHOR_EMAIL must be set in .env}
      REACTOR_WORKER_REPO_ALLOWLIST: ${REACTOR_WORKER_REPO_ALLOWLIST:?REACTOR_WORKER_REPO_ALLOWLIST must be set in .env}
      REACTOR_WORKER_MAINTAINER_LOGINS: ${REACTOR_WORKER_MAINTAINER_LOGINS:-}
      REACTOR_WORKER_REVIEWER_BOTS: ${REACTOR_WORKER_REVIEWER_BOTS:-}

      # --- PR review / vouch gate ---
      # When PRs are gated by the vouch GitHub Action, set the trigger to
      # `vouched_label` so reactor_worker reviews ONLY PRs that survive the gate
      # (the workflow labels survivors `REACTOR_WORKER_VOUCH_REVIEW_LABEL`), instead
      # of racing the gate on PR open. `vouched_label` keeps review ENABLED.
      REACTOR_WORKER_PR_REVIEW_ENABLED: ${REACTOR_WORKER_PR_REVIEW_ENABLED:-true}
      REACTOR_WORKER_PR_REVIEW_TRIGGER: ${REACTOR_WORKER_PR_REVIEW_TRIGGER:-open}
      REACTOR_WORKER_VOUCH_REVIEW_LABEL: ${REACTOR_WORKER_VOUCH_REVIEW_LABEL:-vouched}
      REACTOR_WORKER_VOUCH_REVIEW_LABELER: ${REACTOR_WORKER_VOUCH_REVIEW_LABELER:-github-actions[bot]}

      # --- model selection ---
      REACTOR_WORKER_MODEL: ${REACTOR_WORKER_MODEL:-anthropic/claude-sonnet-4-6}
      REACTOR_WORKER_PROVIDER: ${REACTOR_WORKER_PROVIDER:-}
      REACTOR_WORKER_THINKING: ${REACTOR_WORKER_THINKING:-high}

      # --- runtime tuning ---
      REACTOR_WORKER_MAX_CONCURRENCY: ${REACTOR_WORKER_MAX_CONCURRENCY:-8}
      REACTOR_WORKER_TASK_TIMEOUT_SECONDS: ${REACTOR_WORKER_TASK_TIMEOUT_SECONDS:-2400}
      REACTOR_WORKER_TASK_TIMEOUT_HARD_GRACE_SECONDS: ${REACTOR_WORKER_TASK_TIMEOUT_HARD_GRACE_SECONDS:-60}
      REACTOR_WORKER_REQUEST_TIMEOUT_SECONDS: ${REACTOR_WORKER_REQUEST_TIMEOUT_SECONDS:-120}
      REACTOR_WORKER_RATE_LIMIT_WINDOW_SECONDS: ${REACTOR_WORKER_RATE_LIMIT_WINDOW_SECONDS:-3600}
      REACTOR_WORKER_RATE_LIMIT_DEFAULT: ${REACTOR_WORKER_RATE_LIMIT_DEFAULT:-3}
      REACTOR_WORKER_RATE_LIMIT_CONTRIBUTOR: ${REACTOR_WORKER_RATE_LIMIT_CONTRIBUTOR:-10}
      REACTOR_WORKER_RATE_LIMIT_UNLIMITED: ${REACTOR_WORKER_RATE_LIMIT_UNLIMITED:-}
      REACTOR_WORKER_QUESTION_AUTOCLOSE_ENABLED: ${REACTOR_WORKER_QUESTION_AUTOCLOSE_ENABLED:-true}
      REACTOR_WORKER_QUESTION_AUTOCLOSE_HOURS: ${REACTOR_WORKER_QUESTION_AUTOCLOSE_HOURS:-4}
      REACTOR_WORKER_QUESTION_AUTOCLOSE_SCAN_SECONDS: ${REACTOR_WORKER_QUESTION_AUTOCLOSE_SCAN_SECONDS:-60}
      REACTOR_WORKER_REPLAY_TOKEN: ${REACTOR_WORKER_REPLAY_TOKEN:-}

      # --- container-fixed paths ---
      REACTOR_WORKER_REACTOR_COMMAND: reactor
      REACTOR_WORKER_WORKSPACE_ROOT: /data/workspaces
      REACTOR_WORKER_SQLITE_PATH: /data/reactor_worker.sqlite
      REACTOR_WORKER_LOG_DIR: /data/logs
      REACTOR_WORKER_BIND_HOST: ${REACTOR_WORKER_BIND_HOST:-0.0.0.0}
      REACTOR_WORKER_BIND_PORT: ${REACTOR_WORKER_BIND_PORT:-8080}
      REACTOR_ROOT: /work/reactor
    depends_on:
      gh-proxy:
        condition: service_started
    # Resolve `llm-gateway.internal` (used in /srv/agent-home/.reactor/agent/models.yml) to the
    # Docker host. The actual gateway listens on 127.0.0.1:4000 on the host;
    # `host-gateway` is Docker's alias for the host bridge IP.
    extra_hosts:
      - "llm-gateway.internal:host-gateway"
    networks:
      - default
      - reactor_worker_internal
    volumes:
      - ${REACTOR_ROOT:-../..}:/work/reactor:ro
      - reactor_worker_data:/data
      # Host agent config is mounted read-only under /srv/agent-home-stage
      # with host-controlled permissions. The entrypoint copies it into
      # root-owned, world-readable files under /srv/agent-home; the agent
      # subprocess runs with HOME=/srv/agent-home, so ~/.reactor and ~/.agent
      # resolve there without exposing mutable host mounts.
      - ${HOME}/.reactor/agent/models.container.yml:/srv/agent-home-stage/.reactor/agent/models.yml:ro
      - ${HOME}/.agent/AGENT.md:/srv/agent-home-stage/.agent/AGENTS.md:ro
      - ${HOME}/.agent/rules:/srv/agent-home-stage/.agent/rules:ro
    ports:
      - "0.0.0.0:6543:8080"

  # ───────────────────────────────────────────────────────────────────────────
  # gh-proxy
  #
  # The only container that ever holds GITHUB_TOKEN. Reachable only from the
  # orchestrator on the internal-only network — no host port mapping. Every
  # request must carry a valid HMAC signature (REACTOR_WORKER_GH_PROXY_HMAC_KEY).
  # `env_file:` is INTENTIONALLY ABSENT for the same reason: the explicit
  # allowlist below is the only place where any var lands in this container.
  # ───────────────────────────────────────────────────────────────────────────
  gh-proxy:
    image: reactor-worker:dev
    container_name: gh-proxy
    restart: unless-stopped
    command: ["python", "-m", "reactor_worker.proxy", "serve"]
    environment:
      # PAT: lives ONLY here. The orchestrator's compose block refuses to
      # let this var into its container.
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN must be set in .env}
      # Shared with the orchestrator: HMAC verification key.
      REACTOR_WORKER_GH_PROXY_HMAC_KEY: ${REACTOR_WORKER_GH_PROXY_HMAC_KEY:?REACTOR_WORKER_GH_PROXY_HMAC_KEY must be set in .env}
      # The proxy reuses the SandboxManager pool layout under /data/workspaces.
      REACTOR_WORKER_WORKSPACE_ROOT: /data/workspaces
      REACTOR_WORKER_SQLITE_PATH: /data/reactor_worker.sqlite
      REACTOR_WORKER_LOG_DIR: /data/logs
      # Bind on the internal network only.
      REACTOR_WORKER_GH_PROXY_BIND_HOST: 0.0.0.0
      REACTOR_WORKER_GH_PROXY_BIND_PORT: 8081
      # Settings still requires these on construction; the proxy never uses
      # them but the validator runs the same code path as the orchestrator.
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      REACTOR_WORKER_BOT_LOGIN: ${REACTOR_WORKER_BOT_LOGIN:?REACTOR_WORKER_BOT_LOGIN must be set in .env}
      REACTOR_WORKER_GIT_AUTHOR_EMAIL: ${REACTOR_WORKER_GIT_AUTHOR_EMAIL:?REACTOR_WORKER_GIT_AUTHOR_EMAIL must be set in .env}
      REACTOR_WORKER_REPO_ALLOWLIST: ${REACTOR_WORKER_REPO_ALLOWLIST:?REACTOR_WORKER_REPO_ALLOWLIST must be set in .env}
    networks:
      # `default` gives gh-proxy outbound NAT to api.github.com; `reactor_worker_internal`
      # is how the orchestrator reaches it. No `ports:` mapping → still
      # unreachable from the host or any sibling project.
      - default
      - reactor_worker_internal
    volumes:
      # Shared workspace pool/worktrees so the proxy can drive git operations
      # against the same per-issue worktrees the orchestrator builds.
      - reactor_worker_data:/data

networks:
  # External-facing bridge: webhook ingress (8080) and the orchestrator's
  # outbound path to the host LLM gateway via extra_hosts.
  default: {}
  # Orchestrator <-> gh-proxy only. internal: true means no egress and no
  # ingress from outside the compose project.
  reactor_worker_internal:
    internal: true

volumes:
  # Docker-managed Linux volume so UID/GID permissions on /data are enforced.
  reactor_worker_data: {}
